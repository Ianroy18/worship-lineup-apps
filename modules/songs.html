<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --danger: #ef4444;
            --text-main: #f1f5f9;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 20px; color: var(--text-main); min-height: 100vh; }
        .container { max-width: 500px; margin: 0 auto; }
        .form-card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); padding: 24px; border-radius: 24px; margin-bottom: 24px; }
        input { width: 100%; padding: 14px; margin-bottom: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 12px; color: white; box-sizing: border-box; }
        .btn-add { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }
        
        /* Modal Styles */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: var(--card-bg); padding: 30px; border-radius: 20px; text-align: center; }
        .spinner { border: 4px solid #334155; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .song-item { background: var(--card-bg); padding: 16px 20px; margin-bottom: 12px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .btn-remove { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>Song Library</h1>
    <div class="form-card">
        <input id="songTitle" placeholder="Song Title">
        <input id="songKey" placeholder="Key (e.g. D)">
        <button class="btn-add" onclick="processSong()">Add to Library</button>
    </div>
    <ul id="songList"></ul>
</div>

<div id="loadingModal" class="modal">
    <div class="modal-content">
        <div class="spinner"></div>
        <p>Adding to library...</p>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', renderSongs);

    function processSong() {
        const title = document.getElementById('songTitle').value;
        const key = document.getElementById('songKey').value;
        if (!title || !key) return alert("Please fill in fields");

        // Show Modal
        document.getElementById('loadingModal').style.display = 'flex';

        // Simulate delay
        setTimeout(() => {
            const library = JSON.parse(localStorage.getItem('songLibrary') || '[]');
            library.push({ title, key });
            localStorage.setItem('songLibrary', JSON.stringify(library));
            
            document.getElementById('songTitle').value = '';
            document.getElementById('songKey').value = '';
            document.getElementById('loadingModal').style.display = 'none';
            renderSongs();
        }, 800);
    }

    function removeSong(index) {
        const library = JSON.parse(localStorage.getItem('songLibrary') || '[]');
        library.splice(index, 1);
        localStorage.setItem('songLibrary', JSON.stringify(library));
        renderSongs();
    }

    function renderSongs() {
        const library = JSON.parse(localStorage.getItem('songLibrary') || '[]');
        const list = document.getElementById('songList');
        list.innerHTML = '';
        library.forEach((song, index) => {
            const li = document.createElement('li');
            li.className = 'song-item';
            li.innerHTML = `<div><strong>${song.title}</strong> <span style="margin-left:10px; color:var(--primary)">Key: ${song.key}</span></div>
                            <button class="btn-remove" onclick="removeSong(${index})">Delete</button>`;
            list.appendChild(li);
        });
    }
</script>
</body>
</html>
