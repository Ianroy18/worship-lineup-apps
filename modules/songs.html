<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
            padding: 20px; 
            color: var(--text-main);
            min-height: 100vh;
        }
        
        .container { max-width: 500px; margin: 0 auto; }

        .form-card { 
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 24px; 
            border-radius: 24px; 
            margin-bottom: 24px; 
        }
        
        input { 
            width: 100%; padding: 14px; margin-bottom: 12px; 
            background: #0f172a; border: 1px solid #334155; 
            border-radius: 12px; color: white; box-sizing: border-box;
        }
        
        .btn-add { 
            width: 100%; padding: 14px; background: var(--primary); color: white; 
            border: none; border-radius: 12px; font-weight: 700; cursor: pointer; 
        }

        #songList { list-style: none; padding: 0; }
        .song-item {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            padding: 16px 20px; margin-bottom: 12px; border-radius: 16px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .key-badge {
            background: rgba(59, 130, 246, 0.2); 
            color: var(--primary); padding: 6px 14px; 
            border-radius: 12px; font-size: 0.8rem; font-weight: 700;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            padding: 20px;
            display: flex;
            justify-content: space-around;
            border-top: 1px solid #334155;
        }
    </style>
</head>

<body>

<div class="container">
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
        <h1>Song Library</h1>
        <a href="../index.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Home</a>
    </header>

    <div class="form-card">
        <h3>Add New Song</h3>
        <input id="songTitle" placeholder="Song Title">
        <input id="songKey" placeholder="Key (e.g. D)">
        <button class="btn-add" onclick="addSong()">Add to Library</button>
    </div>

    <ul id="songList">
        <li class="song-item">
            <strong>Way Maker</strong>
            <span class="key-badge">Key: D</span>
        </li>
    </ul>
</div>

<footer class="bottom-nav">
    <a href="team.html" style="color: var(--text-muted); text-decoration: none;">Team</a>
    <a href="songs.html" style="color: var(--primary); text-decoration: none; font-weight: 700;">Songs</a>
    <a href="lineup.html" style="color: var(--text-muted); text-decoration: none;">Lineup</a>
</footer>

</body>
</html>
