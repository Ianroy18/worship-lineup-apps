<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Library Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); --primary: #3b82f6; --danger: #ef4444; --text-main: #f1f5f9; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 20px; color: var(--text-main); min-height: 100vh; }
        .container { max-width: 500px; margin: 0 auto; }
        .form-card { background: var(--card-bg); backdrop-filter: blur(12px); padding: 24px; border-radius: 24px; margin-bottom: 24px; border: 1px solid rgba(255,255,255,0.1); }
        input, textarea { width: 100%; padding: 14px; margin-bottom: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 12px; color: white; box-sizing: border-box; }
        .btn-add { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .song-item { background: var(--card-bg); padding: 16px; margin-bottom: 12px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        /* Modal Styles */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: var(--bg-dark); padding: 30px; border-radius: 20px; width: 90%; max-width: 450px; max-height: 80vh; overflow-y: auto; position: relative; }
        .close-btn { position: absolute; top: 15px; right: 20px; cursor: pointer; font-size: 1.5rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>Song Library</h1>
    <div class="form-card">
        <input id="title" placeholder="Song Title">
        <input id="key" placeholder="Key (e.g. D)">
        <input id="url" placeholder="YouTube Link">
        <textarea id="lyrics" placeholder="Lyrics and Chords" rows="4"></textarea>
        <button class="btn-add" onclick="addSong()">Add to Library</button>
    </div>
    <ul id="songList" style="list-style: none; padding:0;"></ul>
</div>

<div id="viewModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle"></h2>
        <p id="modalKey" style="color: var(--primary); font-weight: bold;"></p>
        <pre id="modalLyrics" style="white-space: pre-wrap; font-family: inherit;"></pre>
        <a id="modalUrl" target="_blank" style="display: block; margin-top: 15px; color: var(--primary);">Listen on YouTube</a>
        <button class="btn-add" style="margin-top:20px; background:var(--danger)" onclick="deleteCurrent()">Delete Song</button>
    </div>
</div>

<script>
    let currentDeleteIndex = null;
    document.addEventListener('DOMContentLoaded', renderSongs);

    function addSong() {
        const song = {
            title: document.getElementById('title').value,
            key: document.getElementById('key').value,
            url: document.getElementById('url').value,
            lyrics: document.getElementById('lyrics').value
        };
        if (!song.title) return alert("Title required!");
        
        const library = JSON.parse(localStorage.getItem('lib') || '[]');
        library.push(song);
        localStorage.setItem('lib', JSON.stringify(library));
        renderSongs();
    }

    function renderSongs() {
        const lib = JSON.parse(localStorage.getItem('lib') || '[]');
        const list = document.getElementById('songList');
        list.innerHTML = '';
        lib.forEach((s, i) => {
            const li = document.createElement('li');
            li.className = 'song-item';
            li.innerHTML = `<strong>${s.title}</strong> <span>Key: ${s.key}</span>`;
            li.onclick = () => openModal(i);
            list.appendChild(li);
        });
    }

    function openModal(i) {
        const lib = JSON.parse(localStorage.getItem('lib'));
        const s = lib[i];
        currentDeleteIndex = i;
        document.getElementById('modalTitle').innerText = s.title;
        document.getElementById('modalKey').innerText = 'Key: ' + s.key;
        document.getElementById('modalLyrics').innerText = s.lyrics;
        document.getElementById('modalUrl').href = s.url;
        document.getElementById('viewModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('viewModal').style.display = 'none'; }
    
    function deleteCurrent() {
        const lib = JSON.parse(localStorage.getItem('lib'));
        lib.splice(currentDeleteIndex, 1);
        localStorage.setItem('lib', JSON.stringify(lib));
        closeModal();
        renderSongs();
    }
</script>
</body>
</html>
