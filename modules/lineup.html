<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Lineup Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
            padding: 20px; 
            color: var(--text-main);
            min-height: 100vh;
        }

        .builder-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 24px;
            border-radius: 24px;
            max-width: 500px;
            margin: 20px auto;
        }

        .input-group { display: flex; gap: 10px; }
        
        input { 
            flex: 1; padding: 14px; background: #0f172a; 
            border: 1px solid #334155; border-radius: 12px; color: white; 
        }
        
        .btn-add { 
            background: var(--primary); color: white; border: none; 
            padding: 0 20px; border-radius: 12px; font-weight: 700; cursor: pointer; 
        }

        #lineupList { list-style: none; max-width: 500px; margin: 20px auto; }
        
        .lineup-item {
            background: var(--card-bg); backdrop-filter: blur(10px);
            padding: 18px; margin-bottom: 12px; border-radius: 16px;
            display: flex; align-items: center; gap: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .lineup-number {
            background: #334155; color: var(--primary); font-weight: 700;
            width: 32px; height: 32px; display: flex; align-items: center;
            justify-content: center; border-radius: 50%; font-size: 0.9rem;
        }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px);
            padding: 20px; display: flex; justify-content: space-around;
            border-top: 1px solid #334155;
        }
    </style>
</head>
<body>

<header style="text-align: center; margin-bottom: 20px;">
    <h1>Worship Lineup</h1>
</header>

<div class="builder-card">
    <h3 style="margin-top: 0;">Build Setlist</h3>
    <div class="input-group">
        <input id="lineupSong" placeholder="Search song name...">
        <button class="btn-add" onclick="addLineup()">Add</button>
    </div>
</div>

<ul id="lineupList"></ul>

<footer class="bottom-nav">
    <a href="team.html" style="color: var(--text-muted); text-decoration: none;">Team</a>
    <a href="songs.html" style="color: var(--text-muted); text-decoration: none;">Songs</a>
    <a href="lineup.html" style="color: var(--primary); text-decoration: none; font-weight: 700;">Lineup</a>
</footer>

<script>
    // Load list pagbukas ng page
    document.addEventListener('DOMContentLoaded', loadLineup);

    function addLineup() {
        const input = document.getElementById('lineupSong');
        const songName = input.value.trim();
        if (!songName) return;

        const list = JSON.parse(localStorage.getItem('myLineup') || '[]');
        list.push(songName);
        localStorage.setItem('myLineup', JSON.stringify(list));
        
        input.value = "";
        renderList();
    }

    function renderList() {
        const list = JSON.parse(localStorage.getItem('myLineup') || '[]');
        const listElement = document.getElementById('lineupList');
        listElement.innerHTML = '';

        list.forEach((song, index) => {
            const li = document.createElement('li');
            li.className = 'lineup-item';
            li.innerHTML = `
                <div class="lineup-number">${index + 1}</div>
                <span>${song}</span>
            `;
            listElement.appendChild(li);
        });
    }

    function loadLineup() { renderList(); }
</script>

</body>
</html>
