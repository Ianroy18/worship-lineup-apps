<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Schedule</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --danger: #ef4444;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
            padding: 20px; 
            color: var(--text-main);
            min-height: 100vh;
        }

        .form-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 24px;
            border-radius: 24px;
            max-width: 500px;
            margin: 20px auto;
        }

        .input-group { margin-bottom: 12px; }
        
        input { 
            width: 100%; padding: 14px; background: #0f172a; 
            border: 1px solid #334155; border-radius: 12px; color: white; box-sizing: border-box;
        }

        .btn-add { 
            width: 100%; padding: 14px; background: var(--primary); color: white; 
            border: none; border-radius: 12px; font-weight: 700; cursor: pointer; 
        }

        #practiceList { list-style: none; max-width: 500px; margin: 20px auto; }
        
        .schedule-item {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 16px; margin-bottom: 12px; border-radius: 16px;
            display: flex; align-items: center; gap: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .date-box {
            background: rgba(59, 130, 246, 0.15); color: var(--primary);
            padding: 10px; border-radius: 12px; text-align: center;
            font-weight: 700; min-width: 50px; font-size: 0.8rem;
        }

        .btn-remove {
            background: rgba(239, 68, 68, 0.1); color: var(--danger);
            border: none; padding: 6px 10px; border-radius: 8px;
            cursor: pointer; font-size: 0.7rem; margin-left: auto;
        }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px);
            padding: 20px; display: flex; justify-content: space-around;
            border-top: 1px solid #334155;
        }
    </style>
</head>

<body>

<header style="text-align: center; margin-bottom: 20px;">
    <h1>Practice Schedule</h1>
</header>

<div class="form-card">
    <h3 style="margin-top: 0;">Add Schedule</h3>
    <div class="input-group">
        <input id="practiceDate" type="date">
    </div>
    <div class="input-group">
        <input id="practiceTeam" placeholder="Team/Group Name">
    </div>
    <button class="btn-add" onclick="addPractice()">Save Schedule</button>
</div>

<ul id="practiceList"></ul>

<footer class="bottom-nav">
    <a href="team.html" style="color: var(--text-muted); text-decoration: none;">Team</a>
    <a href="songs.html" style="color: var(--text-muted); text-decoration: none;">Songs</a>
    <a href="lineup.html" style="color: var(--text-muted); text-decoration: none;">Lineup</a>
</footer>

<script>
    document.addEventListener('DOMContentLoaded', renderSchedule);

    function addPractice() {
        const date = document.getElementById('practiceDate').value;
        const team = document.getElementById('practiceTeam').value;
        if (!date || !team) return alert("Punan ang lahat ng fields");

        const schedule = JSON.parse(localStorage.getItem('practiceData') || '[]');
        schedule.push({ date, team });
        schedule.sort((a, b) => new Date(a.date) - new Date(b.date)); // Auto-sort by date
        localStorage.setItem('practiceData', JSON.stringify(schedule));
        
        renderSchedule();
    }

    function removeSchedule(index) {
        const schedule = JSON.parse(localStorage.getItem('practiceData') || '[]');
        schedule.splice(index, 1);
        localStorage.setItem('practiceData', JSON.stringify(schedule));
        renderSchedule();
    }

    function renderSchedule() {
        const schedule = JSON.parse(localStorage.getItem('practiceData') || '[]');
        const list = document.getElementById('practiceList');
        list.innerHTML = '';

        schedule.forEach((item, index) => {
            const d = new Date(item.date);
            const month = d.toLocaleDateString('en-US', { month: 'short' }).toUpperCase();
            const day = d.getDate();
            
            const li = document.createElement('li');
            li.className = 'schedule-item';
            li.innerHTML = `
                <div class="date-box">${month}<br>${day}</div>
                <div>
                    <strong style="display: block;">${item.team}</strong>
                    <small style="color: var(--text-muted);">Practice Session</small>
                </div>
                <button class="btn-remove" onclick="removeSchedule(${index})">Delete</button>
            `;
            list.appendChild(li);
        });
    }
</script>

</body>
</html>
