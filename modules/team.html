<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worship Team</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --danger: #ef4444;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
            padding: 20px; 
            color: var(--text-main);
            min-height: 100vh;
        }

        .container { max-width: 500px; margin: 0 auto; }

        .form-card { 
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 24px; 
            border-radius: 24px; 
            margin-bottom: 24px; 
        }

        input { 
            width: 100%; padding: 14px; margin-bottom: 12px; 
            background: #0f172a; border: 1px solid #334155; 
            border-radius: 12px; color: white; box-sizing: border-box;
        }

        .btn-add { 
            width: 100%; padding: 14px; background: var(--primary); color: white; 
            border: none; border-radius: 12px; font-weight: 700; cursor: pointer; 
        }

        #teamList { list-style: none; padding: 0; }
        .team-item {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            padding: 16px 20px; margin-bottom: 12px; border-radius: 16px;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 4px solid var(--primary);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .btn-remove {
            background: rgba(239, 68, 68, 0.1); color: var(--danger); 
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 8px 12px; border-radius: 8px; 
            font-size: 0.8rem; cursor: pointer;
        }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            padding: 20px;
            display: flex; justify-content: space-around;
            border-top: 1px solid #334155;
        }
    </style>
</head>

<body>

<div class="container">
    <header style="display:flex; justify-content: space-between; align-items:center; margin-bottom: 20px;">
        <h1>Worship Team</h1>
        <a href="../index.html" style="text-decoration:none; color:var(--primary); font-weight: 600;">Home</a>
    </header>

    <div class="form-card">
        <h3>Add New Member</h3>
        <input id="memberName" placeholder="Member Name">
        <input id="instrument" placeholder="Instrument/Role">
        <button class="btn-add" onclick="addMember()">Add to Team</button>
    </div>

    <ul id="teamList">
        <li class="team-item">
            <div>
                <strong style="display: block;">John Cruz</strong>
                <small style="color: var(--text-muted);">Guitarist</small>
            </div>
            <button class="btn-remove">Remove</button>
        </li>
    </ul>
</div>

<footer class="bottom-nav">
    <a href="team.html" style="color: var(--primary); text-decoration: none; font-weight: 700;">Team</a>
    <a href="songs.html" style="color: var(--text-muted); text-decoration: none;">Songs</a>
    <a href="lineup.html" style="color: var(--text-muted); text-decoration: none;">Lineup</a>
</footer>

</body>
</html>
