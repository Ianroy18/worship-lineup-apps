<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="login-box">

<h2>Login</h2>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button class="btn" onclick="login()">Login</button>

<!-- help example to show modal -->
<button class="btn" style="margin-top:10px;" onclick="showModal({title:'Need help?', body:'Please contact your administrator or check the README.'})">Help</button>

</div>

<script src="js/app.js"></script>

</body>
</html>
