<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Worship Lineup</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-box {
            background: var(--glass-bg);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo {
            width: 120px;
            height: auto;
            margin-bottom: 20px;
            border-radius: 12px;
        }

        h2 {
            font-size: 1.5rem;
            color: var(--text-main);
            margin-bottom: 8px;
            font-weight: 700;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.2s;
            margin-bottom: 15px;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-login {
            background-color: var(--primary);
            color: white;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-help {
            background: transparent;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 15px;
            text-decoration: underline;
        }

        .btn-help:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>

<div class="login-box">
    <img src="bggf.jpg" alt="Grace Gospel Fellowship Logo" class="logo">
    
    <h2>Welcome Back</h2>
    <p class="subtitle">Worship Lineup Management System</p>

    <div class="input-group">
        <input id="email" type="email" placeholder="Email Address">
        <input id="password" type="password" placeholder="Password">
    </div>

    <button class="btn btn-login" onclick="login()">Login</button>

    <button class="btn btn-help" onclick="showModal({title:'Need help?', body:'Please contact your administrator or check the README.'})">
        Forgot password or need help?
    </button>
</div>

<script src="js/app.js"></script>

</body>
</html>
