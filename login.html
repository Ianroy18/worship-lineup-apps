<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Grace Gospel Fellowship</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-gradient: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            --glass-bg: rgba(255, 255, 255, 0.98);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-box {
            background: var(--glass-bg);
            width: 100%;
            max-width: 380px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .logo { width: 100px; height: auto; margin-bottom: 24px; }

        h2 { font-size: 1.5rem; color: #1e293b; margin-bottom: 24px; }

        /* Modern Input Styling */
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: #475569; margin-bottom: 8px; }
        
        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            background: #f8fafc;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .btn-login:hover { background: var(--primary-hover); transform: translateY(-2px); }
        
        .btn-help {
            margin-top: 20px;
            background: none;
            border: none;
            color: #64748b;
            font-size: 0.85rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .btn-help:hover { color: var(--primary); text-decoration: underline; }
    </style>
</head>
<body>

<div class="login-box">
    <img src="bggf.jpg" alt="Logo" class="logo">
    <h2>Sign In</h2>

    <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="name@church.com">
    </div>

    <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••">
    </div>

    <button class="btn-login" onclick="login()">Login to Dashboard</button>

    <button class="btn-help" onclick="showModal({title:'Need help?', body:'Please contact your administrator.'})">
        Forgot password or need help?
    </button>
</div>

</body>
</html>
