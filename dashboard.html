<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worship Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 120px;
        }

        header {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(20px);
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .container { max-width: 1100px; margin: 25px auto; padding: 0 20px; }

        h2 { font-size: 1.75rem; margin-bottom: 25px; font-weight: 800; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card h3 {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 15px;
        }

        .service-info {
            background: linear-gradient(135deg, var(--primary) 0%, #1d4ed8 100%);
            border: none;
        }

        .role-tag {
            background: rgba(59, 130, 246, 0.2);
            color: var(--primary);
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 700;
        }

        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            padding: 12px 30px;
            border-radius: 40px;
            display: flex;
            gap: 30px;
            border: 1px solid #334155;
        }

        .nav-link { text-decoration: none; color: var(--text-muted); font-size: 0.8rem; }
        .nav-link.active { color: var(--primary); font-weight: 700; }
    </style>
</head>
<body>

<header>
    <h1 style="font-size: 1.25rem; color: var(--primary);">WorshipLine</h1>
    <a href="index.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">Back to Home</a>
</header>

<div class="container">
    <h2>Dashboard</h2>

    <div class="grid">
        <div class="card service-info">
            <h3>📅 Next Service</h3>
            <h4 style="font-size: 1.5rem;">Sunday Worship</h4>
            <p style="opacity: 0.9;">March 15, 2026 | 9:00 AM</p>
            <p style="margin-top: 15px; font-weight: 600;">Leader: John Cruz</p>
        </div>

        <div class="card">
            <h3>👥 Assigned Team</h3>
            <ul>
                <li style="display:flex; justify-content:space-between; padding: 8px 0;">John <span class="role-tag">Guitarist</span></li>
                <li style="display:flex; justify-content:space-between; padding: 8px 0;">Maria <span class="role-tag">Vocals</span></li>
                <li style="display:flex; justify-content:space-between; padding: 8px 0;">Peter <span class="role-tag">Drums</span></li>
            </ul>
        </div>

        <div class="card">
            <h3>🎵 Song Lineup</h3>
            <ol style="list-style: none;">
                <li style="padding: 8px 0;"><span style="color:var(--primary); margin-right:10px;">01</span> Way Maker</li>
                <li style="padding: 8px 0;"><span style="color:var(--primary); margin-right:10px;">02</span> Goodness of God</li>
                <li style="padding: 8px 0;"><span style="color:var(--primary); margin-right:10px;">03</span> Hosanna</li>
            </ol>
        </div>
    </div>
</div>

<footer class="bottom-nav">
    <a class="nav-link active" href="dashboard.html">Dashboard</a>
    <a class="nav-link" href="modules/team.html">Team</a>
    <a class="nav-link" href="modules/songs.html">Songs</a>
    <a class="nav-link" href="modules/lineup.html">Lineup</a>
</footer>

</body>
</html>
