<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worship Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --accent: #f59e0b;
            --bg: #f3f4f6;
            --card: #ffffff;
            --text-dark: #111827;
            --text-light: #6b7280;
            --radius: 16px;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            padding-bottom: 90px;
        }

        /* Header / Navbar */
        header {
            background: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e5e7eb;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
        }

        .btn-home {
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-light);
            padding: 8px 16px;
            border-radius: 10px;
            background: #f9fafb;
        }

        /* Dashboard Container */
        .container {
            max-width: 1100px;
            margin: 25px auto;
            padding: 0 20px;
        }

        h2 {
            font-size: 1.75rem;
            margin-bottom: 25px;
            font-weight: 800;
        }

        /* Dashboard Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        .card h3 {
            font-size: 1.1rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Specific Card Styles */
        .service-info {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
        }

        .service-info h3 { color: rgba(255,255,255,0.8); }
        .service-info h4 { font-size: 1.5rem; margin-bottom: 5px; }
        .service-info p { opacity: 0.9; }

        /* List Styles */
        ul, ol {
            list-style: none;
        }

        li {
            padding: 12px 0;
            border-bottom: 1px solid #f3f4f6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        li:last-child { border-bottom: none; }

        .role-tag {
            background: #eef2ff;
            color: var(--primary);
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 700;
        }

        .song-number {
            color: var(--primary);
            font-weight: 800;
            margin-right: 10px;
        }

        /* Bottom Nav bar */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(17, 24, 39, 0.9);
            backdrop-filter: blur(10px);
            padding: 10px 30px;
            border-radius: 40px;
            display: flex;
            gap: 40px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }

        .nav-link {
            text-decoration: none;
            color: #9ca3af;
            font-size: 0.8rem;
            text-align: center;
            transition: 0.2s;
        }

        .nav-link:hover { color: white; }
        .nav-link.active { color: #fbbf24; }

    </style>
</head>
<body>

<header>
    <h1>WorshipLine</h1>
    <a class="btn-home" href="index.html">Back to Home</a>
</header>

<div class="container">
    <h2>Dashboard</h2>

    <div class="grid">
        <div class="card service-info">
            <h3>📅 Next Service</h3>
            <h4>Sunday Worship</h4>
            <p>March 15, 2026 | 9:00 AM</p>
            <p style="margin-top: 15px; font-weight: 600;">Leader: John Cruz</p>
        </div>

        <div class="card">
            <h3>👥 Assigned Team</h3>
            <ul>
                <li>John <span class="role-tag">Guitarist</span></li>
                <li>Maria <span class="role-tag">Vocals</span></li>
                <li>Peter <span class="role-tag">Drums</span></li>
            </ul>
        </div>

        <div class="card">
            <h3>🎵 Song Lineup</h3>
            <ol>
                <li><span class="song-number">01</span> Way Maker</li>
                <li><span class="song-number">02</span> Goodness of God</li>
                <li><span class="song-number">03</span> Hosanna</li>
            </ol>
        </div>
    </div>
</div>

<footer class="bottom-nav">
    <a class="nav-link active" href="dashboard.html">Dashboard</a>
    <a class="nav-link" href="modules/team.html">Team</a>
    <a class="nav-link" href="modules/songs.html">Songs</a>
    <a class="nav-link" href="modules/lineup.html">Lineup</a>
</footer>

</body>
</html>
